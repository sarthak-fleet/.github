<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sarthak-fleet">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset=".5" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="bg" cx=".5" cy=".32" r=".9">
      <stop offset="0" stop-color="#102a40"/>
      <stop offset="1" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="hub" cx=".4" cy=".35" r=".75">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset=".5" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
  </defs>

  <!-- hex badge -->
  <path d="M128 14 L227 71 L227 185 L128 242 L29 185 L29 71 Z"
        fill="url(#bg)" stroke="url(#edge)" stroke-width="3" stroke-linejoin="round"/>

  <!-- spokes: hub → products -->
  <g stroke="url(#edge)" stroke-width="1.6" opacity=".5" stroke-linecap="round">
    <line x1="128" y1="128" x2="190" y2="128"/>
    <line x1="128" y1="128" x2="159" y2="74"/>
    <line x1="128" y1="128" x2="97"  y2="74"/>
    <line x1="128" y1="128" x2="66"  y2="128"/>
    <line x1="128" y1="128" x2="97"  y2="182"/>
    <line x1="128" y1="128" x2="159" y2="182"/>
  </g>

  <!-- product node halos -->
  <g fill="#5eead4" opacity=".15">
    <circle cx="190" cy="128" r="11"/><circle cx="159" cy="74" r="11"/><circle cx="97" cy="74" r="11"/>
    <circle cx="66" cy="128" r="11"/><circle cx="97" cy="182" r="11"/><circle cx="159" cy="182" r="11"/>
  </g>
  <!-- product node cores -->
  <g fill="#67e8f9">
    <circle cx="190" cy="128" r="5"/><circle cx="159" cy="74" r="5"/><circle cx="97" cy="74" r="5"/>
    <circle cx="66" cy="128" r="5"/><circle cx="97" cy="182" r="5"/><circle cx="159" cy="182" r="5"/>
  </g>

  <!-- hub -->
  <circle cx="128" cy="128" r="24" fill="#5eead4" opacity=".12"/>
  <circle cx="128" cy="128" r="15" fill="url(#hub)"/>
  <circle cx="128" cy="128" r="15" fill="none" stroke="#ecfeff" stroke-width="1.2" opacity=".7"/>
</svg>
